<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matu — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fbf9f4;
        color: #1f2937;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 340px; }
      h1 { font-size: 20px; margin: 16px 0 8px; color: #1f4a3a; }
      p { font-size: 14px; color: #6b7280; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #1f4a3a;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Matu couldn't reach the network. If you've opened routes or bookings before,
        they may still be available once the app finishes loading — otherwise, try
        again when you're back online.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
